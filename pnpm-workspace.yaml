# Pre-approved native build scripts for pnpm 11.
#
# pnpm 11 refuses to run install/postinstall scripts unless the package
# is listed here. Without this file, `pnpm install` on a fresh clone
# fails with ERR_PNPM_IGNORED_BUILDS for these four standard native
# deps:
#   - @firebase/util  — Firebase shared utilities
#   - esbuild         — Vite bundler's WASM/native binary
#   - protobufjs      — used transitively by Firebase Admin
#   - sharp           — image optimization (Astro's image pipeline)
#
# The `allowBuilds` schema is the canonical pnpm 11 location for this
# (it replaced the v10 `pnpm.onlyBuiltDependencies` field in
# package.json — see https://pnpm.io/settings#allowbuilds).
allowBuilds:
  '@firebase/util': true
  esbuild: true
  protobufjs: true
  sharp: true
