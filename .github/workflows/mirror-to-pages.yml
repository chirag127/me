name: Mirror to GitHub Pages

# Survival-layer deploy per 100-year-strategy §16. Builds a stripped-down
# version of me.oriz.in (just /work + /me + the four legal pages) and
# pushes it to the `gh-pages` branch of this same repo so it serves at
# https://chirag127.github.io/oriz-me/.
#
# This is the durable fallback URL: if me.oriz.in resolves nowhere, if
# Cloudflare loses the account, if the Turso cache is gone, recruiters
# can still reach the work page here as long as the GitHub account
# survives. The github.io URL never lapses.
#
# Uses ONLY the built-in GITHUB_TOKEN — no secrets to provision, no
# extra tokens to rotate. Per the parked-secrets discussion this is the
# whole point: the survival layer cannot depend on infra we might forget
# to renew.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Single in-flight deploy. If a second push lands while the first is
# building we cancel the older one — the gh-pages branch only ever
# reflects the latest main.
concurrency:
  group: pages-mirror
  cancel-in-progress: true

permissions:
  contents: write # peaceiris/actions-gh-pages pushes to gh-pages branch

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build mirror (MIRROR_BUILD=1, BASE_URL=/oriz-me/)
        run: pnpm exec tsx scripts/build-mirror.ts
        env:
          MIRROR_BUILD: '1'
          BASE_URL: /oriz-me/
          # Firebase env vars are intentionally omitted — the mirror
          # never talks to Firebase. If Layout.astro reads them at build
          # time the Astro build will inline empty strings, which is
          # correct for the survival layer (no auth, no chat, no
          # journal aggregates).

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true # keep gh-pages a single-commit history
          commit_message: |
            chore(mirror): redeploy survival layer ${{ github.sha }}

            Built from main@${{ github.sha }} with MIRROR_BUILD=1.
            See 100-year-strategy.md §16.
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
