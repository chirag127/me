name: Build resume PDFs

on:
  push:
    branches: [main]
    paths:
      - 'src/content/authored/resume/**'
      - '.github/workflows/build-resume.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to publish a Release with the PDFs
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install RenderCV
        run: pip install rendercv

      - name: Build full variant
        run: rendercv render src/content/authored/resume/full.yaml --output-folder-name dist-resume/full

      - name: Build backend variant
        run: rendercv render src/content/authored/resume/backend.yaml --output-folder-name dist-resume/backend

      - name: Build AI variant
        run: rendercv render src/content/authored/resume/ai.yaml --output-folder-name dist-resume/ai

      - name: Stage PDFs with stable names
        run: |
          mkdir -p dist-resume/release
          cp dist-resume/full/Chirag_Singhal_CV.pdf    dist-resume/release/chirag-singhal-resume-full.pdf
          cp dist-resume/backend/Chirag_Singhal_CV.pdf dist-resume/release/chirag-singhal-resume-backend.pdf
          cp dist-resume/ai/Chirag_Singhal_CV.pdf      dist-resume/release/chirag-singhal-resume-ai.pdf

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Publish Release with PDFs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: resume-${{ steps.sha.outputs.short }}
          name: Resume – ${{ steps.sha.outputs.short }}
          body: |
            Auto-generated resume PDFs from RenderCV.
            Built from commit ${{ github.sha }} on ${{ github.event.head_commit.timestamp || github.run_id }}.
          files: dist-resume/release/*.pdf
          fail_on_unmatched_files: true
